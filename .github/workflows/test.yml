name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: python -m compileall weather-briefing-analyst/scripts

      - name: Validate eval seeds
        run: python tests/validate_jsonl.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh
